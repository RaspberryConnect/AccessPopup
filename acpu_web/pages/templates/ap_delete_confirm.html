{% extends 'core.html' %}
{% block core_body %}
<div class="area">
<h3>Confirm Delete</h3>
<p>Are you sure you want to delete the WiFi profile <b>{{ selected_prof }}</b>?</p>

<form method="post" action="/ap_delete">
    <input type="hidden" name="profile" value="{{ selected_prof }}">
    <button type="submit" name="confirm" value="yes" class="submit-btn red">Yes, delete</button>
    <button type="submit" name="confirm" value="no" class="submit-btn grn">No, cancel</button>
</form>
</div>
{% endblock core_body %}
